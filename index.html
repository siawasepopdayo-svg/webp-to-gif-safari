<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4efe4">
  <title>WebP to GIF</title>
  <link rel="manifest" href="./site.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">iPhone Safari Friendly</p>
      <h1>WebP to GIF</h1>
      <p class="lead">複数の WebP をまとめて選んで、その場で GIF に変換します。静止画にもアニメーションにも対応し、画像は端末の外に出ません。</p>
      <div class="hero-actions">
        <label class="primary-button" for="file-input">WebP を選ぶ</label>
        <button class="secondary-button" id="convert-button" type="button" disabled>まとめて変換</button>
      </div>
      <input id="file-input" type="file" accept="image/webp" multiple hidden>
    </header>

    <main class="workspace">
      <section class="drop-panel" id="drop-panel">
        <div class="drop-panel-inner">
          <p class="drop-title">ここに WebP を追加</p>
          <p class="drop-copy">iPhone では写真ピッカーから、Mac ではドラッグ&ドロップでも追加できます。長いアニメーションは少し時間がかかります。</p>
        </div>
      </section>

      <section class="toolbar">
        <div>
          <p class="toolbar-label">保存方法</p>
          <p class="toolbar-value">変換後は各ファイルごとにダウンロードできます。</p>
        </div>
        <button class="ghost-button" id="clear-button" type="button" disabled>選択をクリア</button>
      </section>

      <section class="status-card">
        <p class="status-heading">ステータス</p>
        <p id="status-text">WebP を選ぶと、ここに進捗が表示されます。</p>
      </section>

      <section class="results" id="results"></section>
    </main>
  </div>

  <template id="result-template">
    <article class="result-card">
      <div class="result-meta">
        <div>
          <h2 class="file-name"></h2>
          <p class="file-note"></p>
        </div>
        <span class="file-state"></span>
      </div>
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
      <div class="card-actions">
        <a class="download-button" download>GIF を保存</a>
      </div>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
